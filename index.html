<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVET AI ასისტენტი</title>
<style>
:root{--bg:#0f1117;--surf:#1a1d27;--surf2:#22263a;--brd:#2e3349;--acc:#6c8eff;--accg:rgba(108,142,255,.15);--grn:#4ade80;--red:#f87171;--ylw:#fbbf24;--txt:#e2e8f0;--mut:#64748b;--ubg:#1e2d4a;--bbg:#1a1d27}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surf);border-bottom:1px solid var(--brd);padding:11px 18px;display:flex;align-items:center;gap:11px;flex-shrink:0}
.logo{width:40px;height:40px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#3b5bdb,#6c8eff);display:flex;align-items:center;justify-content:center;font-size:20px}
.hinfo h1{font-size:15px;font-weight:700}
.hinfo p{font-size:11px;color:var(--mut);margin-top:1px}
.badge{margin-left:auto;background:var(--accg);border:1px solid var(--acc);color:var(--acc);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.badge::before{content:'';width:6px;height:6px;background:var(--grn);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stats{background:var(--surf2);border-bottom:1px solid var(--brd);padding:6px 18px;display:flex;gap:18px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.stat{font-size:11px;color:var(--mut);white-space:nowrap}
.stat b{color:var(--acc);font-weight:700}
.limits{background:var(--surf);border-bottom:1px solid var(--brd);padding:5px 18px;display:flex;gap:16px;flex-shrink:0}
.lim{font-size:11.5px;color:var(--mut);display:flex;align-items:center;gap:5px}
.lim span{font-weight:600}
.lim.ok span{color:var(--grn)}
.lim.warn span{color:var(--ylw)}
.lim.over span{color:var(--red)}
#chat{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:13px;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
.msg{display:flex;gap:9px;max-width:860px;animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}
.msg.user .av{background:var(--ubg);border:1px solid #2d4a7a}
.msg.bot .av{background:linear-gradient(135deg,#3b5bdb,#6c8eff)}
.bubble{padding:10px 15px;border-radius:13px;font-size:14px;line-height:1.7;max-width:700px}
.msg.user .bubble{background:var(--ubg);border:1px solid #2a3f66;border-bottom-right-radius:3px;color:#b8d4ff}
.msg.bot .bubble{background:var(--bbg);border:1px solid var(--brd);border-bottom-left-radius:3px}
.bubble strong{color:var(--acc)}
.bubble em{color:var(--grn);font-style:normal;font-weight:600}
.mbadge{display:inline-flex;align-items:center;gap:4px;background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:2px 8px;font-size:11px;color:var(--mut);margin-bottom:6px}
.img-preview{max-width:220px;border-radius:8px;margin-bottom:8px;display:block;border:1px solid var(--brd)}
.dots{display:flex;gap:4px;padding:4px 0}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--acc);opacity:.4;animation:dot 1.2s infinite}
.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}
@keyframes dot{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}
.sugs{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.sug{background:var(--surf2);border:1px solid var(--brd);color:var(--mut);padding:4px 11px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .18s}
.sug:hover{border-color:var(--acc);color:var(--acc);background:var(--accg)}
.input-area{background:var(--surf);border-top:1px solid var(--brd);padding:11px 18px;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:center}
#inp{flex:1;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);padding:10px 15px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
#inp:focus{border-color:var(--acc)}
#inp::placeholder{color:var(--mut)}
.icon-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--brd);background:var(--surf2);color:var(--mut);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.icon-btn:hover{border-color:var(--acc);color:var(--acc)}
.icon-btn.active{border-color:var(--red);color:var(--red);animation:prec 1s infinite}
@keyframes prec{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 6px rgba(248,113,113,0)}}
.icon-btn:disabled{opacity:.4;cursor:not-allowed}
#send-btn{width:40px;height:40px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b5bdb,#6c8eff);color:white;font-size:18px;cursor:pointer;flex-shrink:0;transition:transform .1s}
#send-btn:hover{transform:scale(1.05)}
#send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#img-input{display:none}
.rec-hint{font-size:11px;color:var(--red);margin-top:5px;text-align:center;display:none}
</style>
</head>
<body>
<header>
  <div class="logo">📊</div>
  <div class="hinfo"><h1>EVET AI ასისტენტი</h1><p>Claude AI · პროფ. განათლების ანალიტიკა</p></div>
  <div class="badge">Claude AI</div>
</header>
<div class="stats">
  <div class="stat">🏫 <b>169</b> დაწ.</div>
  <div class="stat">📚 <b>2,135</b> პრ.</div>
  <div class="stat">🎓 <b>201,292</b> სტ.</div>
  <div class="stat">✅ <b>117,244</b> კ.დ.</div>
  <div class="stat">👩‍🏫 <b>9,851</b> თ-ბი</div>
  <div class="stat">💰 <b>452M ₾</b></div>
</div>
<div class="limits">
  <div class="lim ok" id="lim-voice">🎤 ვოისი: <span id="v-used">0</span>/3</div>
  <div class="lim ok" id="lim-img">📷 ფოტო: <span id="i-used">0</span>/3</div>
</div>
<div id="chat"></div>
<div class="input-area">
  <div class="input-row">
    <button class="icon-btn" id="voice-btn" title="ვოისი">🎤</button>
    <button class="icon-btn" id="img-btn" title="ფოტო">📷</button>
    <input id="inp" type="text" placeholder="დასვი კითხვა EVET-ის შესახებ..." autocomplete="off"/>
    <button id="send-btn">➤</button>
  </div>
  <div class="rec-hint" id="rec-hint">🔴 ჩაწერა მიმდინარეობს... დააჭირე ისევ შესაჩერებლად</div>
  <input type="file" id="img-input" accept="image/*"/>
</div>
<script>
const BACKEND="";
const chat=document.getElementById("chat"),inp=document.getElementById("inp"),sendBtn=document.getElementById("send-btn");
const voiceBtn=document.getElementById("voice-btn"),imgBtn=document.getElementById("img-btn");
const imgInput=document.getElementById("img-input"),recHint=document.getElementById("rec-hint");
const vUsed=document.getElementById("v-used"),iUsed=document.getElementById("i-used");
const limVoice=document.getElementById("lim-voice"),limImg=document.getElementById("lim-img");
let history=[],vc=0,ic=0,recording=false,recognition=null;
function fmt(t){return t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/__(.*?)__/g,"<em>$1</em>").replace(/\n/g,"<br>")}
function updLim(){vUsed.textContent=vc;iUsed.textContent=ic;limVoice.className="lim "+(vc>=3?"over":vc>=2?"warn":"ok");limImg.className="lim "+(ic>=3?"over":ic>=2?"warn":"ok");voiceBtn.disabled=vc>=3;imgBtn.disabled=ic>=3}
function addMsg(html,role,pre){const w=document.createElement("div");w.className="msg "+role;const av=document.createElement("div");av.className="av";av.textContent=role==="user"?"👤":"🤖";const b=document.createElement("div");b.className="bubble";if(pre)b.innerHTML=pre;b.innerHTML+=html;w.appendChild(av);w.appendChild(b);chat.appendChild(w);chat.scrollTop=chat.scrollHeight;return b}
function addSugs(items){const last=chat.lastElementChild?.querySelector(".bubble");if(!last)return;const sg=document.createElement("div");sg.className="sugs";items.forEach(s=>{const b=document.createElement("button");b.className="sug";b.textContent=s;b.onclick=()=>{inp.value=s;sendText()};sg.appendChild(b)});last.appendChild(sg)}
function showTyping(){const w=document.createElement("div");w.className="msg bot";w.id="typing";const av=document.createElement("div");av.className="av";av.textContent="🤖";const b=document.createElement("div");b.className="bubble";b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';w.appendChild(av);w.appendChild(b);chat.appendChild(w);chat.scrollTop=chat.scrollHeight}
function rmTyping(){document.getElementById("typing")?.remove()}
function setLoad(on){sendBtn.disabled=on;voiceBtn.disabled=on||vc>=3;imgBtn.disabled=on||ic>=3}
async function sendText(){const q=inp.value.trim();if(!q||sendBtn.disabled)return;inp.value="";addMsg(q,"user");history.push({role:"user",content:q});showTyping();setLoad(true);try{const r=await fetch(BACKEND+"/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:history})});const d=await r.json();if(!r.ok)throw new Error(d.error||"შეცდომა");rmTyping();history.push({role:"assistant",content:d.reply});if(history.length>24)history=history.slice(-24);addMsg(fmt(d.reply),"bot")}catch(e){rmTyping();addMsg('<span style="color:var(--red)">⚠️ '+e.message+"</span>","bot")}finally{setLoad(false)}}
sendBtn.onclick=sendText;
inp.onkeydown=e=>{if(e.key==="Enter")sendText()};
imgBtn.onclick=()=>{if(ic<3)imgInput.click()};
imgInput.onchange=()=>{const file=imgInput.files[0];if(!file)return;imgInput.value="";if(ic>=3){addMsg("📷 ლიმიტი ამოიწურა (3/3).","bot");return}const rdr=new FileReader();rdr.onload=async ev=>{const dataUrl=ev.target.result,b64=dataUrl.split(",")[1],mt=file.type||"image/jpeg",q=inp.value.trim()||"ამ სურათზე რა ინფორმაციაა EVET-ის მონაცემებთან?";inp.value="";const pre=`<img src="${dataUrl}" class="img-preview"/><div class="mbadge">📷 ფოტო</div>`;addMsg(q,"user",pre);showTyping();setLoad(true);try{const r=await fetch(BACKEND+"/chat-image",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({imageBase64:b64,mediaType:mt,question:q,messages:history})});const d=await r.json();if(!r.ok)throw new Error(d.error||"შეცდომა");rmTyping();ic=d.imageUsed||ic+1;updLim();history.push({role:"user",content:q});history.push({role:"assistant",content:d.reply});if(history.length>24)history=history.slice(-24);addMsg(fmt(d.reply),"bot")}catch(e){rmTyping();if(e.message.includes("ლიმიტი"))ic=3;updLim();addMsg('<span style="color:var(--red)">⚠️ '+e.message+"</span>","bot")}finally{setLoad(false)}};rdr.readAsDataURL(file)};
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){voiceBtn.disabled=true;voiceBtn.title="ბრაუზერი არ უჭერს მხარს"}
voiceBtn.onclick=()=>{if(vc>=3){addMsg("🎤 ლიმიტი ამოიწურა (3/3).","bot");return}if(!SR)return;if(recording){recognition?.stop();return}recognition=new SR();recognition.lang="ka-GE";recognition.interimResults=false;recognition.maxAlternatives=1;recognition.onstart=()=>{recording=true;voiceBtn.classList.add("active");recHint.style.display="block"};recognition.onend=()=>{recording=false;voiceBtn.classList.remove("active");recHint.style.display="none"};recognition.onerror=e=>{recording=false;voiceBtn.classList.remove("active");recHint.style.display="none";addMsg("🎤 შეცდომა: "+e.error,"bot")};recognition.onresult=async e=>{const tr=e.results[0][0].transcript;if(!tr)return;addMsg('<div class="mbadge">🎤 ვოისი</div>'+tr,"user");history.push({role:"user",content:tr});showTyping();setLoad(true);try{const r=await fetch(BACKEND+"/chat-voice",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({transcript:tr,messages:history})});const d=await r.json();if(!r.ok)throw new Error(d.error||"შეცდომა");rmTyping();vc=d.voiceUsed||vc+1;updLim();history.push({role:"assistant",content:d.reply});if(history.length>24)history=history.slice(-24);addMsg(fmt(d.reply),"bot")}catch(e){rmTyping();if(e.message.includes("ლიმიტი"))vc=3;updLim();addMsg('<span style="color:var(--red)">⚠️ '+e.message+"</span>","bot")}finally{setLoad(false)}};recognition.start()};
(async()=>{try{const r=await fetch(BACKEND+"/usage");const d=await r.json();vc=d.voice||0;ic=d.image||0;updLim()}catch(_){}addMsg("👋 გამარჯობა! მე ვარ <strong>EVET-ის AI ასისტენტი</strong>.<br><br>📝 ტექსტი — პირდაპირ ჩაწერე<br>🎤 ვოისი — მიკროფონის ღილაკი (დღეში 3)<br>📷 ფოტო — კამერის ღილაკი (დღეში 3)","bot");addSugs(["რამდენი სასწ. გვაქვს?","იმერეთის დ-ბები?","2023 დაფინ.?","ყველ. პოპ. პრ.?","სტ. სქ. მიხ.?"])})();
</script>
</body>
</html>

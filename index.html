<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVET AI ასისტენტი</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3349;
    --accent: #6c8eff;
    --accent-glow: rgba(108,142,255,0.15);
    --green: #4ade80;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --user-bg: #1e2d4a;
    --bot-bg: #1a1d27;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .logo {
    width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, #3b5bdb, #6c8eff);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    box-shadow: 0 0 14px rgba(108,142,255,.4);
  }
  .header-info h1 { font-size: 16px; font-weight: 700; }
  .header-info p  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .badge {
    margin-left: auto; background: var(--accent-glow); border: 1px solid var(--accent);
    color: var(--accent); font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 20px; display: flex; align-items: center; gap: 5px;
  }
  .badge::before {
    content:''; width:6px; height:6px; background: var(--green); border-radius:50%;
    box-shadow: 0 0 6px var(--green); animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .stats {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 7px 20px; display: flex; gap: 20px; overflow-x: auto;
    scrollbar-width: none; flex-shrink: 0;
  }
  .stat { display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--muted); white-space:nowrap; }
  .stat b { color: var(--accent); font-weight: 700; }

  #chat {
    flex: 1; overflow-y: auto; padding: 18px 20px;
    display: flex; flex-direction: column; gap: 14px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .msg { display:flex; gap:10px; max-width:860px; animation: up .22s ease; }
  @keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .msg.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg.bot  { align-self:flex-start; }
  .av {
    width:36px; height:36px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; flex-shrink:0; margin-top:2px;
  }
  .msg.user .av { background:var(--user-bg); border:1px solid #2d4a7a; }
  .msg.bot  .av { background:linear-gradient(135deg,#3b5bdb,#6c8eff); box-shadow:0 0 10px rgba(108,142,255,.3); }
  .bubble {
    padding:11px 16px; border-radius:14px;
    font-size:14px; line-height:1.7; max-width:700px;
  }
  .msg.user .bubble { background:var(--user-bg); border:1px solid #2a3f66; border-bottom-right-radius:4px; color:#b8d4ff; }
  .msg.bot  .bubble { background:var(--bot-bg); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .bubble strong { color: var(--accent); }
  .bubble em     { color: var(--green); font-style:normal; font-weight:600; }

  .dots { display:flex; gap:4px; padding:4px 0; }
  .dots span {
    width:7px; height:7px; border-radius:50%; background:var(--accent); opacity:.4;
    animation: dot 1.2s infinite;
  }
  .dots span:nth-child(2){animation-delay:.18s}
  .dots span:nth-child(3){animation-delay:.36s}
  @keyframes dot { 0%,100%{transform:translateY(0);opacity:.4} 50%{transform:translateY(-5px);opacity:1} }

  .sugs { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
  .sug {
    background:var(--surface2); border:1px solid var(--border); color:var(--muted);
    padding:5px 12px; border-radius:20px; font-size:12px; cursor:pointer; font-family:inherit;
    transition:all .18s;
  }
  .sug:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }

  .input-wrap {
    background:var(--surface); border-top:1px solid var(--border);
    padding:12px 20px; display:flex; gap:10px; flex-shrink:0;
  }
  #inp {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:11px 16px; border-radius:10px;
    font-size:14px; font-family:inherit; outline:none; transition:border-color .2s;
  }
  #inp:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }
  #inp::placeholder { color:var(--muted); }
  #btn {
    background:linear-gradient(135deg,#3b5bdb,#6c8eff); border:none; color:white;
    padding:11px 18px; border-radius:10px; font-size:18px; cursor:pointer; flex-shrink:0;
    transition:transform .1s,box-shadow .2s; box-shadow:0 0 12px rgba(108,142,255,.3);
  }
  #btn:hover  { transform:scale(1.05); box-shadow:0 0 20px rgba(108,142,255,.5); }
  #btn:active { transform:scale(.97); }
  #btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .err { color:var(--red); font-size:12.5px; }
</style>
</head>
<body>

<header>
  <div class="logo">📊</div>
  <div class="header-info">
    <h1>EVET AI ასისტენტი</h1>
    <p>Claude AI · პროფ. განათლების ანალიტიკა</p>
  </div>
  <div class="badge">Claude AI</div>
</header>

<div class="stats">
  <div class="stat">🏫 <b>169</b> დაწ.</div>
  <div class="stat">📚 <b>2,135</b> პრ.</div>
  <div class="stat">🎓 <b>201,292</b> სტ.</div>
  <div class="stat">✅ <b>117,244</b> კ.დ.</div>
  <div class="stat">👩‍🏫 <b>9,851</b> თ-ბი</div>
  <div class="stat">💰 <b>452,025,014 ₾</b></div>
  <div class="stat">📝 <b>50,122</b> განაცხ.</div>
</div>

<div id="chat"></div>

<div class="input-wrap">
  <input id="inp" type="text" placeholder="დასვი კითხვა EVET-ის მონაცემებზე..." autocomplete="off"/>
  <button id="btn">➤</button>
</div>

<script>
  // ⚠️ შეცვალე ეს ბმული Render-ზე deploy-ის შემდეგ
  const BACKEND_URL = "https://YOUR-RENDER-APP.onrender.com";

  const chat = document.getElementById('chat');
  const inp  = document.getElementById('inp');
  const btn  = document.getElementById('btn');
  let history = [];

  function addMsg(html, role) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const av = document.createElement('div');
    av.className = 'av';
    av.textContent = role === 'user' ? '👤' : '🤖';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = html;
    wrap.appendChild(av);
    wrap.appendChild(bub);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bub;
  }

  function addSugs(items) {
    const last = chat.lastElementChild?.querySelector('.bubble');
    if (!last) return;
    const sg = document.createElement('div');
    sg.className = 'sugs';
    items.forEach(s => {
      const b = document.createElement('button');
      b.className = 'sug'; b.textContent = s;
      b.onclick = () => { inp.value = s; send(); };
      sg.appendChild(b);
    });
    last.appendChild(sg);
  }

  function showTyping() {
    const w = document.createElement('div');
    w.className = 'msg bot'; w.id = 'typing';
    const av = document.createElement('div');
    av.className = 'av'; av.textContent = '🤖';
    const b = document.createElement('div');
    b.className = 'bubble';
    b.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    w.appendChild(av); w.appendChild(b);
    chat.appendChild(w);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() { document.getElementById('typing')?.remove(); }

  function fmt(t) {
    return t
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/__(.*?)__/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  async function send() {
    const q = inp.value.trim();
    if (!q || btn.disabled) return;
    inp.value = ''; btn.disabled = true;

    addMsg(q, 'user');
    history.push({ role: 'user', content: q });
    showTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');

      removeTyping();
      history.push({ role: 'assistant', content: data.reply });
      if (history.length > 24) history = history.slice(-24);
      addMsg(fmt(data.reply), 'bot');
    } catch(e) {
      removeTyping();
      addMsg(`<span class="err">⚠️ შეცდომა: ${e.message}</span>`, 'bot');
    } finally {
      btn.disabled = false; inp.focus();
    }
  }

  btn.onclick = send;
  inp.onkeydown = e => { if (e.key === 'Enter') send(); };

  // Welcome
  addMsg('👋 გამარჯობა! მე ვარ <strong>EVET-ის AI ასისტენტი</strong>, Claude-ზე დაფუძნებული.<br><br>დასვი ნებისმიერი კითხვა პროფ. განათლების სტატისტიკის შესახებ.', 'bot');
  addSugs(['რამდენი სასწ. გვაქვს?', 'იმერეთის დ-ბები?', '2023 დაფინ.?', 'ყველ. პოპ. პრ.?', 'სტ. სქ. მიხ.?', 'თ-ბები რეგ. მიხ.?']);
</script>
</body>
</html>
